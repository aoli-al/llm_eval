model_defaults:
  timeout_seconds: 600
  max_iterations: 20

benchmarks:
  freebsd-buffer-overflow:
    source_dir: benchmarks/freebsd-src
    copy_paths:
      - sys
    target_file: sys/rpc/rpcsec_gss/svc_rpcsec_gss.c
    target_function: svc_rpc_gss_validate
    context_dir: sys/rpc
    project_name: FreeBSD
    prompt_template: prompts/security_audit.md
    patches:
      - patches/freebsd-src/18-runtime-clamped-budget.patch
    evaluation:
      positive_indicators:
        - buffer overflow
        - stack.?buffer overflow
        - out.of.bounds
        - bounds? check
        - oa_length
        - oa->oa_length
        - MAX_AUTH_BYTES
        - memcpy.*rpchdr
        - memcpy.*oa_base
        - CWE.120
        - CWE.121
        - CWE.787
      location_indicators:
        file_pattern: svc_rpcsec_gss\.c
        line_range: [1180, 1195]

trials_per_variant: 1
